<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Foodie | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FFF8F0] min-h-screen flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden border border-orange-50/50">
        <div class="p-8 pb-0 text-center">
            <h2 class="text-3xl font-extrabold text-gray-800">Welcome back</h2>
            <p class="text-gray-400 mt-2">Login to continue to Foodie</p>
        </div>

        <div class="p-8">
            <div th:if="${loginError}" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-3 mb-4 rounded-lg text-sm font-medium">
                <p th:text="${loginError}"></p>
            </div>

            <div th:if="${param.registered}" class="bg-green-100 border-l-4 border-green-500 text-green-700 p-3 mb-4 rounded-lg text-sm font-medium">
                Registration successful! Please login below.
            </div>

            <form th:action="@{/login}" method="post" class="space-y-5">
                <div>
                    <label class="block text-gray-600 text-sm font-bold mb-1 ml-1">Username</label>
                    <input type="text" name="username" placeholder="johndoe123" required
                        class="w-full px-5 py-3 rounded-2xl bg-gray-50 border border-gray-200 focus:border-[#FF8C42] focus:ring-2 focus:ring-[#FF8C42]/20 outline-none transition">
                </div>

                <div>
                    <label class="block text-gray-600 text-sm font-bold mb-1 ml-1">Password</label>
                    <input type="password" name="password" placeholder="••••••••" required
                        class="w-full px-5 py-3 rounded-2xl bg-gray-50 border border-gray-200 focus:border-[#FF8C42] focus:ring-2 focus:ring-[#FF8C42]/20 outline-none transition">
                </div>

                <button type="submit"
                    class="w-full mt-4 bg-[#FF8C42] text-white py-4 rounded-2xl font-bold text-lg hover:bg-[#E67E30] hover:shadow-lg hover:shadow-orange-200 transition-all active:scale-[0.98]">
                    Login
                </button>
            </form>

            <div class="mt-6 text-center text-gray-500">
                Don't have an account?
                <a href="/register" class="text-[#FF8C42] font-bold hover:underline">Register here</a>
            </div>
        </div>

        <div class="h-2 bg-[#FF8C42] w-full"></div>
    </div>
</body>
</html>
