<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Foodie | Order History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Apply dark mode if enabled
        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('darkMode') === 'enabled') {
                document.documentElement.classList.add('dark');
            }
        });
    </script>
    <style>
        .dark body { background-color: #121212; color: #e5e7eb; }
        .dark .bg-white { background-color: #1f1f1f; color: white; border-color: #333; }
    </style>
</head>
<body class="bg-[#FFF8F0] min-h-screen transition-colors duration-300">

    <nav class="bg-white dark:bg-[#1f1f1f] shadow-md p-4 flex justify-between items-center border-b-4 border-[#FF8C42] sticky top-0 z-50">
        <h1 class="text-3xl font-black text-[#FF8C42]">Foodie.</h1>
        <a href="/menu" class="text-gray-600 dark:text-gray-300 font-bold hover:text-[#FF8C42] transition flex items-center gap-2">
            <span>←</span> Back to Menu
        </a>
    </nav>

    <div class="max-w-4xl mx-auto p-6 md:p-12">
        <header class="mb-10">
            <h2 class="text-4xl font-black text-gray-800 dark:text-white">Past Orders</h2>
            <p class="text-gray-500 mt-2">Everything you've enjoyed so far.</p>
        </header>

        <div th:if="${#lists.isEmpty(orders)}" class="bg-white dark:bg-[#1f1f1f] rounded-[3rem] p-16 text-center shadow-xl border border-orange-100 dark:border-gray-800">
            <span class="text-6xl block mb-6">🍽️</span>
            <p class="text-gray-400 text-xl font-bold">You haven't ordered anything yet!</p>
            <a href="/menu" class="mt-6 inline-block bg-[#FF8C42] text-white px-8 py-3 rounded-2xl font-bold hover:scale-105 transition">Start Ordering</a>
        </div>

        <div th:each="order : ${orders}" class="bg-white dark:bg-[#1f1f1f] rounded-[2.5rem] shadow-lg p-8 mb-6 border border-orange-100 dark:border-gray-800 flex flex-col md:flex-row justify-between items-center gap-6 transform hover:shadow-xl transition-all">
            
            <div class="flex-1 w-full">
                <div class="flex items-center gap-3 mb-2">
                    <span class="bg-orange-100 dark:bg-orange-900/30 text-[#FF8C42] text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest" th:text="${order.date}">DATE</span>
                </div>
                
                <h3 class="text-xl font-bold text-gray-800 dark:text-white leading-tight" th:text="${order.summary}">Items Summary</h3>
                
                <div class="mt-4 flex items-center gap-4">
                    <p class="text-[#FF8C42] font-black text-2xl" th:text="'₹' + ${order.total}"></p>
                    <span class="text-gray-300 dark:text-gray-600">|</span>
                    <span class="text-gray-400 text-sm font-medium">Paid via <span th:text="${order.payment_method != null ? order.payment_method : 'UPI'}">UPI</span></span>
                </div>
            </div>

            <div class="w-full md:w-auto">
                <form th:action="@{/reorder}" method="post">
                    <input type="hidden" name="ids" th:value="${order.ids}">
                    <button type="submit" class="w-full md:w-auto bg-gray-800 dark:bg-[#FF8C42] text-white px-10 py-4 rounded-2xl font-bold hover:bg-black dark:hover:bg-[#E67E30] transition shadow-lg active:scale-95 flex items-center justify-center gap-2">
                        <span>🔄</span> Re-order
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div class="h-20"></div>

</body>
</html>
