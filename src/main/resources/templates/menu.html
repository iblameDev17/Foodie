<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Foodie | Order Now</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FFF8F0]">
    <nav class="bg-white shadow-md p-4 flex justify-between items-center border-b-4 border-[#FF8C42] sticky top-0 z-50">
        <h1 class="text-3xl font-bold text-[#FF8C42]">Foodie.</h1>
        <div class="flex items-center gap-6">
            <span class="text-gray-700 font-medium">Welcome back, <span class="text-[#FF8C42]" th:text="${userName}">User</span>!</span>
            <a href="/cart" class="relative bg-orange-100 text-[#FF8C42] px-4 py-2 rounded-lg hover:bg-orange-200 transition font-bold flex items-center gap-2">
                🛒 Cart 
                <span th:if="${cartSize > 0}" class="bg-[#FF8C42] text-white text-xs px-2 py-1 rounded-full font-extrabold" th:text="${cartSize}">0</span>
            </a>
            <a href="/logout" class="bg-[#FF8C42] text-white px-4 py-2 rounded-lg hover:bg-[#E67E30] transition">Logout</a>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-6">
        <header class="text-center py-12">
            <h2 class="text-5xl font-extrabold text-gray-800">What's on your mind?</h2>
            <p class="text-gray-500 mt-2">Fresh ingredients, fast delivery, and extra love.</p>
            
            <div class="mt-6 flex justify-center gap-4">
                <a href="/menu" class="px-6 py-2 rounded-full border-2 border-gray-200 font-bold hover:border-[#FF8C42] transition">All</a>
                <a href="/menu?vegOnly=true" class="px-6 py-2 rounded-full border-2 border-green-200 text-green-600 font-bold hover:bg-green-50 transition">Veg Only</a>
                <a href="/menu?vegOnly=false" class="px-6 py-2 rounded-full border-2 border-red-200 text-red-600 font-bold hover:bg-red-50 transition">Non-Veg</a>
            </div>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div th:each="item : ${foodItems}" class="bg-white rounded-[2.5rem] shadow-lg overflow-hidden border border-orange-100 transform hover:scale-105 transition duration-300 group">
                
                <div class="relative h-52 overflow-hidden">
                    <img th:src="${item.image}" th:alt="${item.name}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                    <div class="absolute top-4 left-4 px-3 py-1 rounded-full text-[10px] font-bold shadow-sm border"
                         th:classappend="${item.isVeg ? 'bg-white text-green-600 border-green-200' : 'bg-white text-red-600 border-red-200'}"
                         th:text="${item.isVeg ? '● VEG' : '● NON-VEG'}">
                    </div>
                </div>

                <div class="p-6">
                    <div class="flex justify-between items-start mb-3">
                        <h3 class="text-xl font-bold text-gray-800" th:text="${item.name}">Item</h3>
                        <span class="text-[#FF8C42] font-black text-xl" th:text="'₹' + ${item.price}">₹0</span>
                    </div>

                    <p class="text-gray-500 text-sm mb-6 line-clamp-2" th:text="${item.description}">Description</p>

                    <div class="flex gap-3">
                        <a th:href="@{/item/{id}(id=${item.id})}" class="flex-1 bg-gray-50 text-gray-600 py-3 rounded-2xl font-bold hover:bg-gray-100 transition text-center text-sm">
                            Details
                        </a>

                        <form th:action="@{/addToCart}" method="post" class="flex-[1.5]">
                            <input type="hidden" name="itemId" th:value="${item.id}">
                            <input type="hidden" name="itemName" th:value="${item.name}">
                            <input type="hidden" name="itemPrice" th:value="${item.price}">
                            <button type="submit" class="w-full bg-[#FF8C42] text-white py-3 rounded-2xl font-bold hover:bg-[#E67E30] hover:shadow-lg transition-all active:scale-95">
                                Add to Cart
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
