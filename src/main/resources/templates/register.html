<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Foodie | Join Us</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FFF8F0] min-h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden border border-orange-50/50">
        <div class="p-8 pb-0 text-center">
            <h2 class="text-3xl font-extrabold text-gray-800">Create Account</h2>
            <p class="text-gray-400 mt-2">Join the Foodie community today</p>
        </div>

        <div class="p-8">
            <form th:action="@{/register}" th:object="${user}" method="post" class="space-y-5">
                <div>
                    <label class="block text-gray-600 text-sm font-bold mb-1 ml-1">Full Name</label>
                    <input type="text" th:field="*{name}" placeholder="John Doe"
                        class="w-full px-5 py-3 rounded-2xl bg-gray-50 border border-gray-200 focus:border-[#FF8C42] focus:ring-2 focus:ring-[#FF8C42]/20 outline-none transition">
                    <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-red-500 text-xs mt-1 ml-1 font-semibold"></p>
                </div>
                
                <div>
                    <label class="block text-gray-600 text-sm font-bold mb-1 ml-1">Username</label>
                    <input type="text" th:field="*{username}" placeholder="johndoe123"
                        class="w-full px-5 py-3 rounded-2xl bg-gray-50 border border-gray-200 focus:border-[#FF8C42] focus:ring-2 focus:ring-[#FF8C42]/20 outline-none transition">
                    <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-red-500 text-xs mt-1 ml-1 font-semibold"></p>
                </div>

                <div>
                    <label class="block text-gray-600 text-sm font-bold mb-1 ml-1">Password</label>
                    <input type="password" th:field="*{password}" placeholder="••••••••"
                        class="w-full px-5 py-3 rounded-2xl bg-gray-50 border border-gray-200 focus:border-[#FF8C42] focus:ring-2 focus:ring-[#FF8C42]/20 outline-none transition">
                    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-red-500 text-xs mt-1 ml-1 font-semibold"></p>
                </div>

                <button type="submit" 
                    class="w-full mt-4 bg-[#FF8C42] text-white py-4 rounded-2xl font-bold text-lg hover:bg-[#E67E30] hover:shadow-lg hover:shadow-orange-200 transition-all active:scale-[0.98]">
                    Register Now
                </button>
            </form>

            <div class="mt-6 text-center text-gray-500">
                Already have an account? 
                <a th:href="@{/}" class="text-[#FF8C42] font-bold hover:underline">Login here</a>
            </div>
        </div>
        
        <div class="h-2 bg-[#FF8C42] w-full"></div>
    </div>

</body>
</html>
